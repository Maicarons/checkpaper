name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build backend image
      run: docker build -f Dockerfile.backend -t checkpaper-backend .
    
    - name: Build frontend image
      run: docker build -t checkpaper-frontend ./frontend
